# fly.toml app configuration file for Citrus Care
# Refer to https://fly.io/docs/reference/configuration/ for details.

app = "citrus-care-app"
primary_region = "lax"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
